<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hook — logo options</title>
<style>
  body{margin:0;background:#0C140F;color:#F4EFE4;font-family:system-ui,sans-serif;padding:28px}
  h1{font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#C8ED4A;margin:0 0 20px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:760px}
  .cell{border:1px solid rgba(244,239,228,.12);border-radius:18px;overflow:hidden;background:#0C140F}
  .row{display:flex}
  .sw{flex:1;display:grid;place-items:center;padding:22px;min-height:150px}
  .sw--dark{background:#0C140F}
  .sw--paper{background:#F4EFE4}
  .sw svg{width:120px;height:120px}
  .lab{padding:12px 16px;border-top:1px solid rgba(244,239,228,.1)}
  .lab b{color:#C8ED4A;font-size:13px}
  .lab span{display:block;color:#9aa394;font-size:12px;margin-top:3px;line-height:1.4}
  .n{display:inline-block;width:22px;height:22px;border-radius:50%;background:#C8ED4A;color:#0C140F;text-align:center;line-height:22px;font-weight:700;font-size:12px;margin-right:8px}
</style>  <!-- hook-perf-v1 : perf resource hints + instant nav -->
  <link rel="modulepreload" href="https://esm.sh/gsap@3.12.5" crossorigin fetchpriority="low" />
  <link rel="modulepreload" href="https://esm.sh/gsap@3.12.5/ScrollTrigger" crossorigin fetchpriority="low" />

</head><body>

<div class="grid" id="g"></div>

{n:2,name:"Barbed-h mark on tile",concept:"Fishhook doubling as an h, over a HOOK wordmark",svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect x="0" y="0" width="256" height="256" fill="#0C140F"/><rect x="46" y="26" width="164" height="150" rx="34" fill="#163C2B"/><circle cx="103" cy="52" r="7" fill="#C8ED4A"/><g fill="none" stroke="#C8ED4A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M103 60 L103 124 A36 36 0 0 0 175 124 L175 110"/><path d="M103 94 A30 24 0 0 1 150 90"/></g><polygon points="175,98 165,120 188,118" fill="#C8ED4A"/><g fill="#F4EFE4"><rect x="58" y="206" width="11" height="38" rx="2.5"/><rect x="58" y="219" width="34" height="11" rx="2.5"/><rect x="81" y="206" width="11" height="38" rx="2.5"/></g><g fill="none" stroke="#F4EFE4" stroke-width="11"><circle cx="120" cy="225" r="13"/><circle cx="155" cy="225" r="13"/></g><g fill="#F4EFE4"><rect x="184" y="206" width="11" height="38" rx="2.5"/><rect x="192" y="200" width="10" height="32" rx="3" transform="rotate(40 197 216)"/><rect x="192" y="218" width="10" height="32" rx="3" transform="rotate(-40 197 234)"/></g></svg>`},
{n:3,name:"Hooked-H tile",concept:"H whose right leg sweeps into a fishhook",svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect x="0" y="0" width="256" height="256" rx="56" fill="#163C2B"/><g fill="none" stroke="#C8ED4A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"><path d="M76 60 V196"/><path d="M76 128 H150"/><path d="M150 60 V150 A42 42 0 1 1 66 150"/></g><path d="M66 150 V132" fill="none" stroke="#9FD13A" stroke-width="22" stroke-linecap="round"/><circle cx="66" cy="150" r="12" fill="#F4EFE4"/></svg>`},
{n:4,name:"OO hook-and-bait wordmark",concept:"Final O opens into a hook cradling a bait dot",svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="#0C140F"/><g fill="none" stroke="#C8ED4A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M40 102 V154"/><path d="M72 102 V154"/><path d="M40 128 H72"/><path d="M111 109 A20 20 0 1 0 111 149 A20 20 0 0 0 111 109 Z"/><path d="M173 119 A20 20 0 1 1 192 130 V150 A22 22 0 0 1 150 156"/><path d="M216 102 V154"/><path d="M243 102 L219 128 L243 154"/></g><circle cx="150" cy="170" r="9" fill="#C8ED4A"/></svg>`},
{n:5,name:"Lime fishhook badge",concept:"Clean fishhook — eye, shank, curl, barb — on a forest tile",svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><defs><linearGradient id="t5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c4a35"/><stop offset="1" stop-color="#163C2B"/></linearGradient><linearGradient id="l5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C8ED4A"/><stop offset="1" stop-color="#9FD13A"/></linearGradient></defs><rect x="22" y="22" width="212" height="212" rx="48" fill="url(#t5)"/><rect x="23" y="23" width="210" height="210" rx="47" fill="none" stroke="#C8ED4A" stroke-opacity="0.16" stroke-width="1.5"/><circle cx="170" cy="74" r="20" fill="none" stroke="url(#l5)" stroke-width="16"/><path d="M170 94 v52 a44 44 0 0 1 -88 0 v-6" fill="none" stroke="url(#l5)" stroke-width="16" stroke-linecap="round"/><polygon points="82 122 66 140 98 140" fill="url(#l5)"/></svg>`},
{n:6,name:"Ribbon hook",concept:"Editorial HOOK with a lime ribbon curling into a hook",svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="#0C140F"/><g fill="#F4EFE4"><rect x="42" y="82" width="15" height="64" rx="3"/><rect x="73" y="82" width="15" height="64" rx="3"/><rect x="50" y="107" width="32" height="14" rx="2"/><path d="M119 81a32 32 0 0 0 0 64 32 32 0 0 0 0-64zm0 15a17 17 0 0 1 0 34 17 17 0 0 1 0-34z"/><path d="M171 81a32 32 0 0 0 0 64 32 32 0 0 0 0-64zm0 15a17 17 0 0 1 0 34 17 17 0 0 1 0-34z"/><rect x="201" y="82" width="15" height="64" rx="3"/><polygon points="216,111 239,82 220,82 207,101"/><polygon points="216,116 224,146 243,146 226,107"/></g><path d="M28 170c36 23 82 31 124 27 31-3 58-15 73-33 9-12 8-26-5-32-12-6-26-1-30 11-2 8 2 15 11 16" fill="none" stroke="#C8ED4A" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><circle cx="203" cy="155" r="6.5" fill="#9FD13A"/></svg>`},
{n:7,name:"lowercase hook, barbed k",concept:"Lowercase hook; the k's leg becomes a barbed hook",svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="#0C140F"/><g fill="none" stroke="#C8ED4A" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"><path d="M34 56 V174"/><path d="M34 130 q0 -26 23 -26 q23 0 23 26 V174"/><circle cx="116" cy="150" r="25"/><circle cx="178" cy="150" r="25"/><path d="M222 92 V158 q0 26 -23 26 q-21 0 -21 -21 q0 -19 19 -22"/></g><path d="M196 178 l11 -2 l-5 14 z" fill="#C8ED4A"/></svg>`},

];
const g=document.getElementById('g');
items.forEach(it=>{
  const cell=document.createElement('div');cell.className='cell';
  cell.innerHTML=`<div class="row"><div class="sw sw--dark">${it.svg}</div><div class="sw sw--paper">${it.svg}</div></div><div class="lab"><b><span class="n">${it.n}</span>${it.name}</b><span>${it.concept}</span></div>`;
  g.appendChild(cell);
});
</script>
</body></html>
